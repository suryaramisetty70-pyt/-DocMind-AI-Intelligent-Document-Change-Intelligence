# DocMind AI Docker Compose Configuration
version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    container_name: docmind-api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://docmind:docmind_password@postgres:5432/docmind_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - docmind-network
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Streamlit UI
  ui:
    build:
      context: .
      dockerfile: deployment/Dockerfile
    container_name: docmind-ui
    ports:
      - "8501:8501"
    environment:
      - DOCMIND_API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - docmind-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: docmind-postgres
    environment:
      - POSTGRES_USER=docmind
      - POSTGRES_PASSWORD=docmind_password
      - POSTGRES_DB=docmind_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - docmind-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: docmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - docmind-network
    restart: unless-stopped

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: docmind-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - ui
    networks:
      - docmind-network
    restart: unless-stopped

networks:
  docmind-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: