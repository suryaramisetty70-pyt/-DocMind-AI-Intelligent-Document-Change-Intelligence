name: Render Keep-Alive

on:
  schedule:
    # Run every 10 minutes to prevent Render's free tier from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: |
          curl -I -s https://docfinder-ai.onrender.com/health
