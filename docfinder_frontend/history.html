<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History · doc-differ-ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .main{padding:2rem 2.5rem;background:var(--bg)}
        .page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
        .page-head h1{font-size:1.75rem;font-weight:800;letter-spacing:-.02em}
        .page-head p{color:var(--muted);margin-top:.25rem}
        .empty-search{padding:1rem;background:#fff;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;max-width:400px}
        .empty-search input{flex:1;border:none;outline:none;font:inherit}
        .list{display:flex;flex-direction:column;gap:.75rem}
        .row-date{font-size:.85rem;color:var(--muted)}
        .row-arrow{color:var(--muted);font-size:1.2rem}
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">d</div>
                doc-differ-ai
            </div>
            
            <div class="s-section">Workspace</div>
            <a href="dashboard.html" class="s-link">⚡ New Comparison</a>
            <a href="history.html" class="s-link active">🕓 History</a>
            <a href="collab.html" class="s-link">👥 Live Collab</a>
            <a href="translate.html" class="s-link">🔄 Translation</a>
            
            <div id="adminMenu" style="display:none">
                <div class="s-section">Admin Control</div>
                <a href="admin.html" class="s-link">🛡️ Admin Panel</a>
            </div>
            
            <div class="s-section">Resources</div>
            <a href="index.html#pricing" class="s-link">💳 Pricing Plans</a>
            <a href="index.html#enterprise" class="s-link">🏢 Enterprise Solutions</a>
            <a href="index.html#desktop" class="s-link">💻 Desktop App</a>
            <div class="s-section">Account</div>
            <a href="settings.html" class="s-link">⚙️ Settings</a>
            
            <div class="s-user">
                <div class="avatar" id="userAvatar">A</div>
                <div>
                    <div style="font-weight:600;font-size:.95rem" id="userName">User</div>
                    <div style="font-size:.8rem;opacity:.7">Free plan</div>
                </div>
            </div>
        </aside>
        
        <main class="main">
            <div class="page-head">
                <div>
                    <h1>Comparison history</h1>
                    <p>Every comparison you've run, all in one place.</p>
                </div>
                <a href="dashboard.html"><button class="btn btn-primary">+ New comparison</button></a>
            </div>
            
            <div style="display:flex; gap:12px; margin-bottom:1.5rem; max-width:600px;">
                <div class="empty-search" style="flex:1; display:flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; margin-bottom:0; background:#fff; border:1px solid var(--border); border-radius:12px; max-width:none;">
                    <span>🔍</span>
                    <input type="text" placeholder="Search history by file name..." id="historySearchInput" style="border:none; outline:none; flex:1; font:inherit;" oninput="filterHistoryLocal()">
                </div>
                <button class="btn btn-primary" onclick="filterHistoryLocal()" style="padding:0.5rem 1.25rem;">Search</button>
            </div>
            
            <div class="filters" id="filters">
                <button class="filter active" data-filter="all" onclick="loadHistory()">All History</button>
            </div>
            
            <div class="list" id="historyList">
                <!-- History items will be loaded here -->
            </div>
        </main>
    </div>

    <script>
        // Auto-detect backend location
        const API_URL = (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';
        
        
        // Check auth (make optional)
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        
        document.getElementById('userName').textContent = user || 'Guest';
        document.getElementById('userAvatar').textContent = (user || 'Guest')[0].toUpperCase();
        
        if (localStorage.getItem('isAdmin') === 'true') {
            const adminMenu = document.getElementById('adminMenu');
            if (adminMenu) adminMenu.style.display = 'block';
        }

        if (!token) {
            // Hide sidebar premium links
            const linksToHide = ['collab.html', 'translate.html', 'settings.html'];
            linksToHide.forEach(href => {
                const link = document.querySelector(`.sidebar a[href="${href}"]`);
                if (link) link.style.display = 'none';
            });
        }
        
        let allHistoryItems = [];

        // Load history
        loadHistory();
        
        async function loadHistory() {
            try {
                const headers = {};
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
                const res = await fetch(`${API_URL}/api/history`, {
                    headers: headers
                });
                
                if (res.ok) {
                    allHistoryItems = await res.json();
                    renderHistory(allHistoryItems);
                } else {
                    renderEmpty();
                }
            } catch (err) {
                // Show demo data if API not available
                allHistoryItems = getDemoHistoryItems();
                renderHistory(allHistoryItems);
            }
        }

        function getDemoHistoryItems() {
            return [
                {
                    id: 1,
                    comparison_type: 'text',
                    file1_name: 'contract-v2.txt',
                    file2_name: 'contract-v3.txt',
                    similarity_score: 0.8,
                    created_at: new Date(Date.now() - 120000).toISOString()
                },
                {
                    id: 2,
                    comparison_type: 'pdf',
                    file1_name: 'report-2023.pdf',
                    file2_name: 'report-2024.pdf',
                    similarity_score: 0.64,
                    created_at: new Date(Date.now() - 3600000).toISOString()
                },
                {
                    id: 3,
                    comparison_type: 'excel',
                    file1_name: 'budget-Q3.xlsx',
                    file2_name: 'budget-Q4.xlsx',
                    similarity_score: 0.92,
                    created_at: new Date(Date.now() - 86400000).toISOString()
                },
                {
                    id: 4,
                    comparison_type: 'csv',
                    file1_name: 'customers-old.csv',
                    file2_name: 'customers-new.csv',
                    similarity_score: 0.38,
                    created_at: new Date(Date.now() - 259200000).toISOString()
                }
            ];
        }

        function filterHistoryLocal() {
            const query = document.getElementById('historySearchInput').value.toLowerCase().trim();
            if (!query) {
                renderHistory(allHistoryItems);
                return;
            }
            const filtered = allHistoryItems.filter(item => {
                const f1 = (item.file1_name || '').toLowerCase();
                const f2 = (item.file2_name || '').toLowerCase();
                const type = (item.comparison_type || '').toLowerCase();
                return f1.includes(query) || f2.includes(query) || type.includes(query);
            });
            
            if (filtered.length === 0) {
                document.getElementById('historyList').innerHTML = `
                    <div style="padding:3rem;text-align:center;color:var(--muted)">
                        <p style="font-size:2rem;margin-bottom:0.5rem">🔍</p>
                        <p>No matching history items found.</p>
                    </div>
                `;
            } else {
                renderHistory(filtered);
            }
        }
        
        function renderHistory(items) {
            const list = document.getElementById('historyList');
            
            if (!items || items.length === 0) {
                renderEmpty();
                return;
            }
            
            list.innerHTML = items.map((item, i) => {
                const score = Math.round(parseFloat(item.similarity_score || 0) * 100);
                const typeClass = score >= 80 ? 'high' : score >= 50 ? 'mid' : 'low';
                const icon = getIcon(item.comparison_type);
                const date = formatDate(item.created_at);
                
                return `
                    <div class="row animate-in delay-${(i % 4) + 1}" onclick="viewResult(${item.id})">
                        <div class="type-icon" style="background:${getGradient(item.comparison_type)}">${icon}</div>
                        <div class="row-meta">
                            <h3>${item.file1_name || 'Document A'} → ${item.file2_name || 'Document B'}</h3>
                            <p>${item.comparison_type || 'text'} · ${date}</p>
                        </div>
                        <div class="row-date">${date}</div>
                        <div class="score-pill ${typeClass}">${score}%</div>
                        <div class="row-arrow">→</div>
                    </div>
                `;
            }).join('');
        }
        
        function renderDemoHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = `
                <div class="row animate-in">
                    <div class="type-icon" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8)">📝</div>
                    <div class="row-meta">
                        <h3>contract-v2.txt → contract-v3.txt</h3>
                        <p>Text · 218 lines compared</p>
                    </div>
                    <div class="row-date">2 minutes ago</div>
                    <div class="score-pill high">80%</div>
                    <div class="row-arrow">→</div>
                </div>
                <div class="row animate-in delay-1">
                    <div class="type-icon" style="background:linear-gradient(135deg,#ef4444,#b91c1c)">📄</div>
                    <div class="row-meta">
                        <h3>report-2023.pdf → report-2024.pdf</h3>
                        <p>PDF · 42 pages compared</p>
                    </div>
                    <div class="row-date">1 hour ago</div>
                    <div class="score-pill mid">64%</div>
                    <div class="row-arrow">→</div>
                </div>
                <div class="row animate-in delay-2">
                    <div class="type-icon" style="background:linear-gradient(135deg,#10b981,#047857)">📊</div>
                    <div class="row-meta">
                        <h3>budget-Q3.xlsx → budget-Q4.xlsx</h3>
                        <p>Excel · 3 sheets · 1,204 cells</p>
                    </div>
                    <div class="row-date">Yesterday</div>
                    <div class="score-pill high">92%</div>
                    <div class="row-arrow">→</div>
                </div>
                <div class="row animate-in delay-3">
                    <div class="type-icon" style="background:linear-gradient(135deg,#f59e0b,#b45309)">📈</div>
                    <div class="row-meta">
                        <h3>customers-old.csv → customers-new.csv</h3>
                        <p>CSV · 8,420 rows compared</p>
                    </div>
                    <div class="row-date">3 days ago</div>
                    <div class="score-pill low">38%</div>
                    <div class="row-arrow">→</div>
                </div>
            `;
        }
        
        function renderEmpty() {
            document.getElementById('historyList').innerHTML = `
                <div style="padding:3rem;text-align:center;color:var(--muted)">
                    <p style="font-size:3rem;margin-bottom:1rem">📭</p>
                    <p>No comparisons yet. <a href="dashboard.html" style="color:var(--accent)">Start comparing!</a></p>
                </div>
            `;
        }
        
        function getIcon(type) {
            const icons = {text: '📝', pdf: '📄', excel: '📊', csv: '📈'};
            return icons[type] || '📝';
        }
        
        function getGradient(type) {
            const grads = {
                text: 'linear-gradient(135deg,#3b82f6,#1d4ed8)',
                pdf: 'linear-gradient(135deg,#ef4444,#b91c1c)',
                excel: 'linear-gradient(135deg,#10b981,#047857)',
                csv: 'linear-gradient(135deg,#f59e0b,#b45309)'
            };
            return grads[type] || grads.text;
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return 'Recently';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff/60000)} minutes ago`;
            if (diff < 86400000) return `${Math.floor(diff/3600000)} hours ago`;
            if (diff < 604800000) return `${Math.floor(diff/86400000)} days ago`;
            return date.toLocaleDateString();
        }
        
        async function viewResult(id) {
            try {
                const headers = {};
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
                const res = await fetch(`${API_URL}/api/comparison/${id}`, {
                    headers: headers
                });
                if (res.ok) {
                    const data = await res.json();
                    sessionStorage.setItem('diffResult', JSON.stringify(data.results || data));
                    window.location.href = 'results.html';
                } else {
                    window.location.href = 'results.html';
                }
            } catch (err) {
                window.location.href = 'results.html';
            }
        }
        
        async function performSemanticSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                loadHistory();
                return;
            }
            
            document.getElementById('historyList').innerHTML = '<p style="padding:2rem;text-align:center;">🧠 Searching Vector Database...</p>';
            
            try {
                const res = await fetch(`${API_URL}/api/search`, {
                    method: 'POST',
                    headers: {
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: query, top_k: 5 })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    if (data.results && data.results.length > 0) {
                        const list = document.getElementById('historyList');
                        list.innerHTML = data.results.map((item, i) => {
                            const meta = item.metadata;
                            const score = Math.round(item.score * 100);
                            return `
                                <div class="row animate-in delay-${(i % 4) + 1}" onclick="viewResult(${meta.id})">
                                    <div class="type-icon" style="background:${getGradient('text')}">🧠</div>
                                    <div class="row-meta">
                                        <h3>Semantic Match [ID: ${meta.id}]</h3>
                                        <p>Type: ${meta.type} · User: ${meta.user}</p>
                                    </div>
                                    <div class="row-date">Vector Match</div>
                                    <div class="score-pill high">${score}% Sim</div>
                                    <div class="row-arrow">→</div>
                                </div>
                            `;
                        }).join('');
                    } else {
                        document.getElementById('historyList').innerHTML = '<p style="padding:2rem;text-align:center;">No semantic matches found in vector DB.</p>';
                    }
                }
            } catch (e) {
                document.getElementById('historyList').innerHTML = '<p style="padding:2rem;text-align:center;color:red;">Error searching vector database.</p>';
            }
        }
    </script>
</body>
</html>
