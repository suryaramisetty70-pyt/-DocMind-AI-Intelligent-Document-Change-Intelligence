<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare · DiffLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .main{padding:2rem 2.5rem;background:var(--bg)}
        .page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
        .page-head h1{font-size:1.75rem;font-weight:800;letter-spacing:-.02em}
        .page-head p{color:var(--muted);margin-top:.25rem}
        .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}
        .action-bar{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 1.5rem;background:#fff;border-radius:14px;border:1px solid var(--border)}
        .opts{display:flex;gap:1rem;align-items:center;font-size:.88rem;color:var(--muted)}
        .opts label{display:flex;gap:.4rem;align-items:center}
        .opts input[type="checkbox"]{width:auto}
        textarea.drop{width:100%;min-height:280px;resize:vertical;border:2px dashed var(--border);border-radius:16px;padding:1.5rem;font:inherit;font-family:'JetBrains Mono',monospace;font-size:.9rem;line-height:1.6;background:#fff}
        textarea.drop:focus{outline:none;border-color:var(--accent);border-style:solid}
        .ai-toggle{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:rgba(59,130,246,.08);border-radius:99px;color:var(--accent);font-weight:600;font-size:.85rem}
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">D</div>
                DiffLab
            </div>
            
            <div class="s-section">Workspace</div>
            <a href="dashboard.html" class="s-link active">⚡ New Comparison</a>
            <a href="history.html" class="s-link">🕓 History</a>
            <a href="#" class="s-link">⭐ Saved</a>
            <a href="#" class="s-link">📁 Projects</a>
            
            <div class="s-section">Account</div>
            <a href="#" class="s-link">⚙️ Settings</a>
            <a href="#" class="s-link">💬 Support</a>
            
            <div class="s-user">
                <div class="avatar" id="userAvatar">A</div>
                <div>
                    <div style="font-weight:600;font-size:.95rem" id="userName">User</div>
                    <div style="font-size:.8rem;opacity:.7" id="userPlan">Free plan</div>
                </div>
            </div>
        </aside>
        
        <main class="main">
            <div class="page-head">
                <div>
                    <h1>New comparison</h1>
                    <p>Choose a format and upload your documents.</p>
                </div>
                <button class="btn btn-ghost">+ Import from URL</button>
            </div>
            
            <div class="type-tabs" id="tabs">
                <button class="type-tab active" data-type="text">📝 Text</button>
                <button class="type-tab" data-type="pdf">📄 PDF</button>
                <button class="type-tab" data-type="excel">📊 Excel</button>
                <button class="type-tab" data-type="csv">📈 CSV</button>
            </div>
            
            <div class="compare-grid">
                <div class="card animate-in">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
                        <h3 style="font-weight:700">Source A</h3>
                        <span class="tag" style="padding:.25rem .7rem;border-radius:99px;background:rgba(59,130,246,.1);color:var(--accent);font-size:.7rem;font-weight:700">ORIGINAL</span>
                    </div>
                    <textarea class="drop" id="text1" placeholder="Paste your original text here..."></textarea>
                    <div id="file1Preview" style="display:none;margin-top:1rem;padding:1rem;background:var(--bg);border-radius:12px;text-align:center">
                        <p id="file1Name"></p>
                        <button onclick="clearFile(1)" style="color:var(--error);background:none;border:none;cursor:pointer;font-size:.85rem">Remove</button>
                    </div>
                </div>
                <div class="card animate-in delay-1">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
                        <h3 style="font-weight:700">Source B</h3>
                        <span class="tag" style="padding:.25rem .7rem;border-radius:99px;background:rgba(236,72,153,.1);color:#ec4899;font-size:.7rem;font-weight:700">MODIFIED</span>
                    </div>
                    <textarea class="drop" id="text2" placeholder="Paste your modified text here..."></textarea>
                    <div id="file2Preview" style="display:none;margin-top:1rem;padding:1rem;background:var(--bg);border-radius:12px;text-align:center">
                        <p id="file2Name"></p>
                        <button onclick="clearFile(2)" style="color:var(--error);background:none;border:none;cursor:pointer;font-size:.85rem">Remove</button>
                    </div>
                </div>
            </div>
            
            <div class="action-bar animate-in delay-2">
                <div class="opts">
                    <label><input type="checkbox" id="ignoreWs" checked> Ignore whitespace</label>
                    <label><input type="checkbox" id="caseSens" checked> Case sensitive</label>
                    <div class="ai-toggle" id="aiToggle" onclick="toggleAI()">
                        <span>✨</span> AI analysis
                    </div>
                </div>
                <button class="btn btn-primary" onclick="compareTexts()">⚡ Compare now</button>
            </div>
        </main>
    </div>
    
    <div id="loading" class="loading" style="display:none">
        <div class="spinner"></div>
        <p id="loadingText">Analyzing...</p>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        // Use relative URLs - proxy server handles API routing
        const API_URL = '';
        let currentType = 'text';
        let aiEnabled = true;
        
        // Check auth
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // Set user info
        document.getElementById('userName').textContent = user || 'User';
        document.getElementById('userAvatar').textContent = (user || 'U')[0].toUpperCase();
        
        // Tab switching
        document.querySelectorAll('.type-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentType = tab.dataset.type;
            };
        });
        
        function toggleAI() {
            aiEnabled = !aiEnabled;
            const toggle = document.getElementById('aiToggle');
            toggle.style.background = aiEnabled ? 'rgba(59,130,246,.08)' : 'var(--bg)';
            toggle.style.color = aiEnabled ? 'var(--accent)' : 'var(--muted)';
        }
        
        function clearFile(n) {
            document.getElementById(`text${n}`).value = '';
            document.getElementById(`file${n}Preview`).style.display = 'none';
        }
        
        async function compareTexts() {
            const text1 = document.getElementById('text1').value;
            const text2 = document.getElementById('text2').value;
            
            if (!text1 || !text2) {
                showToast('Please enter both texts', 'error');
                return;
            }
            
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            
            loading.style.display = 'flex';
            loadingText.textContent = 'Analyzing with AI...';
            
            try {
                // Use form data as backend expects
                const formData = new FormData();
                formData.append('text1', text1);
                formData.append('text2', text2);
                formData.append('level', 'word');
                formData.append('to_lowercase', String(!document.getElementById('caseSens').checked));
                formData.append('sort_lines', 'false');
                formData.append('remove_extra_spaces', String(document.getElementById('ignoreWs').checked));
                
                const res = await fetch(`${API_URL}/api/compare/text`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    // Store results and redirect
                    localStorage.setItem('lastResult', JSON.stringify(data));
                    localStorage.setItem('lastTexts', JSON.stringify({text1, text2}));
                    window.location.href = 'results.html';
                } else {
                    showToast(data.detail || 'Comparison failed', 'error');
                }
            } catch (err) {
                showToast('Connection error. Is the server running?', 'error');
            } finally {
                loading.style.display = 'none';
            }
        }
        
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }
    </script>
</body>
</html>
