<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account · Docsy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .orb{width:280px;height:280px;border-radius:50%;background:conic-gradient(from 0deg,#3b82f6,#8b5cf6,#ec4899,#3b82f6);animation:rotate 8s linear infinite;filter:blur(2px);box-shadow:0 0 80px rgba(59,130,246,.6);position:relative}
        .orb::after{content:"";position:absolute;inset:20px;border-radius:50%;background:var(--primary);box-shadow:inset 0 0 40px rgba(255,255,255,.1)}
        @keyframes rotate{to{transform:rotate(360deg)}}
        .steps{display:flex;gap:.5rem;margin-bottom:2rem}
        .step{flex:1;height:4px;border-radius:2px;background:var(--border);overflow:hidden}
        .step.active{background:var(--grad-accent)}
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-art">
            <div class="orb"></div>
        </div>
        
        <div class="auth-form">
            <div class="auth-card animate-in">
                <div class="brand" style="margin-bottom:2rem">
                    <div class="brand-mark">D</div>
                    Docsy
                </div>
                
                <div class="steps">
                    <div class="step active" id="step1"></div>
                    <div class="step" id="step2"></div>
                </div>
                
                <h1 id="formTitle">Create your account</h1>
                <p class="sub" id="formSub">Step 1 of 2 — tell us who you are.</p>
                
                <!-- Step 1: Registration -->
                <form id="step1Form" onsubmit="handleSendOTP(event)">
                    <div class="field">
                        <label>Email address</label>
                        <input type="email" id="regEmail" placeholder="you@company.com" required>
                    </div>
                    <div class="field">
                        <label>Username</label>
                        <input type="text" id="regUsername" placeholder="johndoe" required>
                    </div>
                    <div class="field">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="••••••••" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%" id="sendBtn">
                        Continue →
                    </button>
                </form>
                
                <!-- Step 2: OTP Verification -->
                <form id="step2Form" style="display:none" onsubmit="handleVerifyOTP(event)">
                    <p style="margin-bottom:1rem">We sent a 6-digit code to <strong id="showEmail"></strong></p>
                    <div class="otp">
                        <input type="text" maxlength="1" class="otp-input" data-index="0">
                        <input type="text" maxlength="1" class="otp-input" data-index="1">
                        <input type="text" maxlength="1" class="otp-input" data-index="2">
                        <input type="text" maxlength="1" class="otp-input" data-index="3">
                        <input type="text" maxlength="1" class="otp-input" data-index="4">
                        <input type="text" maxlength="1" class="otp-input" data-index="5">
                    </div>
                    <div style="margin-bottom:1.5rem">
                        <span class="timer">⏱ Expires in <span id="timer">02:00</span></span>
                        <button type="button" onclick="resendOTP()" style="background:none;border:none;color:var(--accent);font-weight:600;margin-left:1rem;cursor:pointer" id="resendBtn" disabled>Resend code</button>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%" id="verifyBtn">
                        Verify & continue →
                    </button>
                    <button type="button" onclick="goBack()" class="btn btn-ghost" style="width:100%;margin-top:.75rem">
                        ← Back
                    </button>
                </form>
                
                <p style="text-align:center;margin-top:1.5rem;color:var(--muted)">
                    Already have an account? <a href="login.html" style="color:var(--accent);font-weight:600">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="loading" class="loading" style="display:none">
        <div class="spinner"></div>
        <p id="loadingText">Please wait...</p>
    </div>

    <script>
        // Auto-detect backend location
        const API_URL = (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';
        let timerInterval;
        
        async function handleSendOTP(e) {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            loading.style.display = 'flex';
            loadingText.textContent = 'Sending OTP to your email...';
            
            const email = document.getElementById('regEmail').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            
            // Store for later use
            localStorage.setItem('reg_email', email);
            localStorage.setItem('reg_username', username);
            localStorage.setItem('reg_password', password);
            
            try {
                const res = await fetch(`${API_URL}/api/auth/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, username, password})
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                    document.getElementById('step1Form').style.display = 'none';
                    document.getElementById('step2Form').style.display = 'block';
                    document.getElementById('formTitle').textContent = 'Verify your email';
                    document.getElementById('formSub').textContent = 'Enter the code we sent you.';
                    document.getElementById('showEmail').textContent = email;
                    showToast('OTP sent to your email!', 'success');
                    startTimer();
                    document.querySelector('.otp-input').focus();
                } else {
                    showToast(data.detail || 'Failed to send OTP', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Continue →';
                }
            } catch (err) {
                showToast('Connection error. Is the server running?', 'error');
                btn.disabled = false;
                btn.textContent = 'Continue →';
            } finally {
                loading.style.display = 'none';
            }
        }
        
        async function handleVerifyOTP(e) {
            e.preventDefault();
            const btn = document.getElementById('verifyBtn');
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            
            const otpInputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(otpInputs).map(i => i.value).join('');
            
            if (otp.length !== 6) {
                showToast('Please enter all 6 digits', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Verifying...';
            loading.style.display = 'flex';
            loadingText.textContent = 'Creating your account...';
            
            try {
                const res = await fetch(`${API_URL}/api/auth/verify-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: localStorage.getItem('reg_email'),
                        otp: otp,
                        username: localStorage.getItem('reg_username'),
                        password: localStorage.getItem('reg_password')
                    })
                });
                
                const data = await res.json();
                
                if (res.ok && data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', localStorage.getItem('reg_username'));
                    localStorage.setItem('user_id', data.user_id);
                    showToast('Account created! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    showToast(data.detail || 'Verification failed', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Verify & continue →';
                }
            } catch (err) {
                showToast('Connection error', 'error');
                btn.disabled = false;
                btn.textContent = 'Verify & continue →';
            } finally {
                loading.style.display = 'none';
            }
        }
        
        function goBack() {
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1Form').style.display = 'block';
            document.getElementById('step2Form').style.display = 'none';
            document.getElementById('formTitle').textContent = 'Create your account';
            document.getElementById('formSub').textContent = 'Step 1 of 2 — tell us who you are.';
            clearInterval(timerInterval);
        }
        
        async function resendOTP() {
            const btn = document.getElementById('resendBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            
            try {
                const res = await fetch(`${API_URL}/api/auth/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: localStorage.getItem('reg_email'),
                        username: localStorage.getItem('reg_username'),
                        password: localStorage.getItem('reg_password')
                    })
                });
                
                if (res.ok) {
                    showToast('OTP resent!', 'success');
                    startTimer();
                } else {
                    showToast('Failed to resend', 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            }
            
            btn.textContent = 'Resend code';
        }
        
        function startTimer() {
            let s = 120;
            const tEl = document.getElementById('timer');
            const rBtn = document.getElementById('resendBtn');
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                s--;
                const m = String(Math.floor(s/60)).padStart(2, '0');
                const sec = String(s%60).padStart(2, '0');
                tEl.textContent = `${m}:${sec}`;
                
                if (s <= 0) {
                    clearInterval(timerInterval);
                    rBtn.disabled = false;
                    tEl.textContent = 'Expired';
                }
            }, 1000);
        }
        
        // OTP input handling
        document.querySelectorAll('.otp-input').forEach((i, idx) => {
            i.addEventListener('input', e => {
                i.classList.toggle('filled', !!i.value);
                if (i.value && idx < 5) {
                    document.querySelectorAll('.otp-input')[idx + 1].focus();
                }
            });
            i.addEventListener('keydown', e => {
                if (e.key === 'Backspace' && !i.value && idx > 0) {
                    document.querySelectorAll('.otp-input')[idx - 1].focus();
                }
            });
        });
        
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }
    </script>
</body>
</html>
