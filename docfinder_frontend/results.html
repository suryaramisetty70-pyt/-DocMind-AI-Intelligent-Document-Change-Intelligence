<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DocMind AI — Diff Results</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --accent: #1f6feb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 20px; font-weight: 700; color: var(--blue); }
  .logo span { color: var(--purple); }
  .back-btn {
    background: var(--border); border: none; color: var(--text);
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: background 0.2s;
  }
  .back-btn:hover { background: #444c56; }

  /* Stats */
  .stats-bar {
    display: flex; gap: 12px; padding: 16px 24px;
    background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .stat-card {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px; flex: 1; min-width: 120px;
  }
  .stat-icon { font-size: 18px; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-green .stat-value { color: var(--green); }
  .stat-red .stat-value { color: var(--red); }
  .stat-yellow .stat-value { color: var(--yellow); }
  .stat-blue .stat-value { color: var(--blue); }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; padding: 12px 24px 0;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .tab {
    padding: 8px 16px; border: none; background: none; color: var(--muted);
    cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent;
    transition: all 0.2s; border-radius: 4px 4px 0 0;
  }
  .tab:hover { color: var(--text); background: var(--bg); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  .content { padding: 24px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Side-by-side custom diff */
  .sbs-container { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .sbs-header { background: var(--border); padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .sbs-body { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; }
  .sbs-line { display: flex; min-height: 24px; border-bottom: 1px solid rgba(48,54,61,0.4); }
  .sbs-num { min-width: 45px; padding: 2px 8px; text-align: right; color: var(--muted); font-size: 11px; user-select: none; border-right: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .sbs-code { padding: 2px 12px; flex: 1; white-space: pre-wrap; word-break: break-all; }
  .sbs-line.del { background: rgba(248,81,73,0.1); }
  .sbs-line.del .sbs-code { color: var(--red); }
  .sbs-line.ins { background: rgba(63,185,80,0.1); }
  .sbs-line.ins .sbs-code { color: var(--green); }
  .sbs-line.mod { background: rgba(210,153,34,0.08); }
  .sbs-col { border-right: 1px solid var(--border); }

  /* Granular table */
  .diff-table { width: 100%; border-collapse: collapse; font-family: 'Courier New', monospace; font-size: 13px; }
  .diff-table th {
    background: var(--border); padding: 10px 16px; text-align: left;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--muted); position: sticky; top: 60px;
  }
  .diff-table td { padding: 6px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .diff-table tr:hover td { background: rgba(255,255,255,0.03); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-added { background: rgba(63,185,80,0.2); color: var(--green); }
  .badge-removed { background: rgba(248,81,73,0.2); color: var(--red); }
  .badge-changed { background: rgba(210,153,34,0.2); color: var(--yellow); }
  .line-old { background: rgba(248,81,73,0.1); border-left: 3px solid var(--red); padding-left: 8px; }
  .line-new { background: rgba(63,185,80,0.1); border-left: 3px solid var(--green); padding-left: 8px; }
  .line-num { color: var(--muted); font-size: 11px; user-select: none; min-width: 40px; display: inline-block; }
  .char-del { background: rgba(248,81,73,0.4); border-radius: 2px; padding: 0 1px; }
  .char-add { background: rgba(63,185,80,0.4); border-radius: 2px; padding: 0 1px; }

  /* AI */
  .ai-panel { max-width: 860px; }
  .ai-analysis-box { background: var(--surface); border: 1px solid var(--accent); border-radius: 12px; padding: 24px; margin-bottom: 24px; line-height: 1.7; white-space: pre-wrap; font-size: 14px; }
  .ai-label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--purple); font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .chat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .chat-messages { padding: 16px; max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .chat-msg { padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.5; max-width: 80%; }
  .chat-msg.user { background: var(--accent); align-self: flex-end; }
  .chat-msg.ai { background: var(--border); align-self: flex-start; }
  .chat-input-row { display: flex; padding: 12px; gap: 8px; border-top: 1px solid var(--border); }
  .chat-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; }
  .chat-input:focus { outline: none; border-color: var(--accent); }
  .chat-send { background: var(--accent); border: none; color: white; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .chat-send:hover { opacity: 0.85; }
  .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Image */
  .image-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 8px; }
  .image-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .image-card-title { padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .image-card img { width: 100%; display: block; }

  .empty-state { text-align: center; padding: 60px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

  /* Modal styling */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active {
    display: flex;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    max-width: 90%;
    width: 1200px;
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: modalFadeIn 0.3s ease;
  }
  @keyframes modalFadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">DocMind <span>AI</span></div>
  <div style="display:flex; gap:10px;">
    <button class="back-btn" id="downloadPdfBtn" onclick="downloadReport('pdf')" style="background:var(--accent); color:white; display:inline-flex; align-items:center; gap:6px;">📥 Export PDF Report</button>
    <button class="back-btn" id="downloadExcelBtn" onclick="downloadReport('excel')" style="background:var(--green); color:white; display:inline-flex; align-items:center; gap:6px;">📥 Export Excel Report</button>
    <button class="back-btn" onclick="location.href='dashboard.html'">← New Comparison</button>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat-card stat-green"><span class="stat-icon">➕</span><div><div class="stat-value" id="statAdded">—</div><div class="stat-label">Added</div></div></div>
  <div class="stat-card stat-red"><span class="stat-icon">➖</span><div><div class="stat-value" id="statRemoved">—</div><div class="stat-label">Removed</div></div></div>
  <div class="stat-card stat-yellow"><span class="stat-icon">✏️</span><div><div class="stat-value" id="statChanged">—</div><div class="stat-label">Changed</div></div></div>
  <div class="stat-card stat-blue"><span class="stat-icon">🔍</span><div><div class="stat-value" id="statSimilarity">—</div><div class="stat-label">Similarity</div></div></div>
  <div class="stat-card"><span class="stat-icon">📊</span><div><div class="stat-value" id="statDiff">—</div><div class="stat-label">Difference</div></div></div>
</div>

<div class="tabs" id="tabsRow">
  <button class="tab active" onclick="switchTab('sideBySide', this)">Side by Side</button>
  <button class="tab" onclick="switchTab('granular', this)">Granular (Line by Line)</button>
  <button class="tab" onclick="switchTab('aiPanel', this)" id="aiTab">🤖 AI Analysis</button>
  <button class="tab" onclick="switchTab('imagePanel', this)" id="imageTab" style="display:none">🖼 Image Diff</button>
</div>

<div class="content">
  <div id="sideBySide" class="panel active"><div id="sbsContent"></div></div>
  <div id="granular" class="panel"><div id="granularContent"></div></div>
  <div id="aiPanel" class="panel">
    <div class="ai-panel">
      <div id="aiAnalysisBox" class="ai-analysis-box">
        <div class="ai-label">🤖 AI Analysis</div>
        <div id="aiText">No AI analysis available. Enable AI Node on dashboard.</div>
      </div>
      <div class="chat-box">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input class="chat-input" id="chatInput" placeholder="Ask about the differences..." onkeydown="if(event.key==='Enter')sendChat()"/>
          <button class="chat-send" id="chatSend" onclick="sendChat()">Send</button>
        </div>
      </div>
    </div>
  </div>
  <div id="imagePanel" class="panel"><div class="image-grid" id="imageGrid"></div></div>
</div>

<script>
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function switchTab(id, btn) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

function populateStats(stats) {
  if (!stats) return;
  document.getElementById("statAdded").textContent = stats.added ?? "—";
  document.getElementById("statRemoved").textContent = stats.removed ?? "—";
  document.getElementById("statChanged").textContent = stats.changed ?? "—";
  document.getElementById("statSimilarity").textContent = stats.similarity_percent != null ? stats.similarity_percent + "%" : "—";
  document.getElementById("statDiff").textContent = stats.difference_percent != null ? stats.difference_percent + "%" : "—";
}

// ═══ CUSTOM SIDE-BY-SIDE DIFF (no diff2html dependency) ═══
function renderSideBySide(text1, text2, differences) {
  const container = document.getElementById("sbsContent");
  const lines1 = (text1 || "").split("\n");
  const lines2 = (text2 || "").split("\n");

  // Build change maps
  const changedLines1 = {};  // line_num1 -> diff object
  const changedLines2 = {};  // line_num2 -> diff object
  (differences || []).forEach(d => {
    if (d.type === "changed") { changedLines1[d.line_num1] = d; changedLines2[d.line_num2] = d; }
    else if (d.type === "removed") { changedLines1[d.line_num1] = d; }
    else if (d.type === "added") { changedLines2[d.line_num2] = d; }
  });

  // Build aligned rows
  let rows = [];
  let i1 = 0, i2 = 0;

  while (i1 < lines1.length || i2 < lines2.length) {
    const ln1 = i1 + 1;
    const ln2 = i2 + 1;
    const d1 = changedLines1[ln1];
    const d2 = changedLines2[ln2];

    if (d1 && d1.type === "changed" && d2 && d2.type === "changed") {
      rows.push({ type: "mod", ln1, ln2, t1: lines1[i1], t2: lines2[i2], diff: d1 });
      i1++; i2++;
    } else if (d1 && d1.type === "removed") {
      rows.push({ type: "del", ln1, ln2: null, t1: lines1[i1], t2: null });
      i1++;
    } else if (d2 && d2.type === "added") {
      rows.push({ type: "ins", ln1: null, ln2, t1: null, t2: lines2[i2] });
      i2++;
    } else {
      rows.push({ type: "eq", ln1: i1 < lines1.length ? ln1 : null, ln2: i2 < lines2.length ? ln2 : null, t1: lines1[i1] || "", t2: lines2[i2] || "" });
      if (i1 < lines1.length) i1++;
      if (i2 < lines2.length) i2++;
    }
  }

  // Render
  let leftHtml = "";
  let rightHtml = "";

  rows.forEach(r => {
    if (r.type === "eq") {
      leftHtml += `<div class="sbs-line"><span class="sbs-num">${r.ln1 || ""}</span><span class="sbs-code">${escHtml(r.t1)}</span></div>`;
      rightHtml += `<div class="sbs-line"><span class="sbs-num">${r.ln2 || ""}</span><span class="sbs-code">${escHtml(r.t2)}</span></div>`;
    } else if (r.type === "del") {
      leftHtml += `<div class="sbs-line del"><span class="sbs-num">${r.ln1}</span><span class="sbs-code">- ${escHtml(r.t1)}</span></div>`;
      rightHtml += `<div class="sbs-line"><span class="sbs-num"></span><span class="sbs-code"></span></div>`;
    } else if (r.type === "ins") {
      leftHtml += `<div class="sbs-line"><span class="sbs-num"></span><span class="sbs-code"></span></div>`;
      rightHtml += `<div class="sbs-line ins"><span class="sbs-num">${r.ln2}</span><span class="sbs-code">+ ${escHtml(r.t2)}</span></div>`;
    } else if (r.type === "mod") {
      const inl = r.diff && r.diff.inline;
      const oldHtml = inl ? buildInlineHtml(inl.filter(s=>s.type!=="added")) : escHtml(r.t1);
      const newHtml = inl ? buildInlineHtml(inl.filter(s=>s.type!=="removed")) : escHtml(r.t2);
      leftHtml += `<div class="sbs-line mod"><span class="sbs-num">${r.ln1}</span><span class="sbs-code">${oldHtml}</span></div>`;
      rightHtml += `<div class="sbs-line mod"><span class="sbs-num">${r.ln2}</span><span class="sbs-code">${newHtml}</span></div>`;
    }
  });

  if (rows.length === 0 || (differences || []).length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>Documents are identical.</p></div>`;
    return;
  }

  container.innerHTML = `
    <div class="sbs-container">
      <div class="sbs-col">
        <div class="sbs-header">📄 Document 1 (Original)</div>
        <div class="sbs-body">${leftHtml}</div>
      </div>
      <div>
        <div class="sbs-header">📄 Document 2 (Modified)</div>
        <div class="sbs-body">${rightHtml}</div>
      </div>
    </div>`;
}

function buildInlineHtml(inline) {
  if (!inline) return "";
  return inline.map(seg => {
    if (seg.type === "removed") return `<span class="char-del">${escHtml(seg.text)}</span>`;
    if (seg.type === "added") return `<span class="char-add">${escHtml(seg.text)}</span>`;
    return escHtml(seg.text);
  }).join("");
}

// ═══ GRANULAR TABLE ═══
function renderGranular(differences) {
  const container = document.getElementById("granularContent");
  if (!differences || differences.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>No differences found. Documents are identical.</p></div>`;
    return;
  }

  let html = `<table class="diff-table"><thead><tr><th>Type</th><th>Line #</th><th>Document 1 (Original)</th><th>Document 2 (Modified)</th></tr></thead><tbody>`;

  differences.forEach(d => {
    let badge="", oldCell="", newCell="", lineNum="";
    if (d.type === "added") {
      badge = `<span class="badge badge-added">Added</span>`;
      oldCell = `<td>—</td>`;
      newCell = `<td class="line-new"><span class="line-num">${d.line_num2}</span> ${escHtml(d.new)}</td>`;
      lineNum = `<td>— → ${d.line_num2}</td>`;
    } else if (d.type === "removed") {
      badge = `<span class="badge badge-removed">Removed</span>`;
      oldCell = `<td class="line-old"><span class="line-num">${d.line_num1}</span> ${escHtml(d.old)}</td>`;
      newCell = `<td>—</td>`;
      lineNum = `<td>${d.line_num1} → —</td>`;
    } else if (d.type === "changed") {
      badge = `<span class="badge badge-changed">Changed</span>`;
      const oldInl = d.inline ? buildInlineHtml(d.inline.filter(s=>s.type!=="added")) : escHtml(d.old);
      const newInl = d.inline ? buildInlineHtml(d.inline.filter(s=>s.type!=="removed")) : escHtml(d.new);
      oldCell = `<td class="line-old"><span class="line-num">${d.line_num1}</span> ${oldInl}</td>`;
      newCell = `<td class="line-new"><span class="line-num">${d.line_num2}</span> ${newInl}</td>`;
      lineNum = `<td>${d.line_num1} → ${d.line_num2}</td>`;
    }
    html += `<tr><td>${badge}</td>${lineNum}${oldCell}${newCell}</tr>`;
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
}

// ═══ IMAGE DIFF ═══
function renderImageDiff(result) {
  document.getElementById("imageTab").style.display = "inline-block";
  const changedElems = result.stats.changed_elements_count != null ? result.stats.changed_elements_count : "—";
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-card stat-yellow"><span class="stat-icon">📦</span><div><div class="stat-value">${changedElems}</div><div class="stat-label">Changed Elements</div></div></div>
    <div class="stat-card stat-red"><span class="stat-icon">🖼</span><div><div class="stat-value">${(result.stats.changed_pixels||0).toLocaleString()}</div><div class="stat-label">Changed Pixels</div></div></div>
    <div class="stat-card stat-blue"><span class="stat-icon">📊</span><div><div class="stat-value">${result.stats.similarity_percent}%</div><div class="stat-label">Similarity</div></div></div>
    <div class="stat-card"><span class="stat-icon">🔍</span><div><div class="stat-value">${result.stats.difference_percent}%</div><div class="stat-label">Difference</div></div></div>`;

  const src1 = sessionStorage.getItem("imgSrc1") || "";
  const src2 = sessionStorage.getItem("imgSrc2") || "";
  
  let html = `
    <div class="image-grid" id="imageGrid" style="margin-bottom: 2rem;">
      <div class="image-card"><div class="image-card-title">📄 Original</div>${src1 ? `<img src="${src1}"/>` : "<p style='padding:20px;color:var(--muted)'>N/A</p>"}</div>
      <div class="image-card"><div class="image-card-title">📄 Modified</div>${src2 ? `<img src="${src2}"/>` : "<p style='padding:20px;color:var(--muted)'>N/A</p>"}</div>
      <div class="image-card"><div class="image-card-title">🔴 Differences (Overlay Highlight)</div><img src="data:image/png;base64,${result.diff_image_base64}"/></div>
    </div>
    
    <div class="slider-container" style="position:relative; width:100%; max-width:800px; height:450px; margin: 2rem auto; border: 1px solid var(--border); border-radius: 12px; overflow:hidden; user-select:none; background:#222;">
      <div class="slider-img img-before" style="position:absolute; top:0; left:0; width:100%; height:100%; background: url('${src1}') no-repeat center/contain;"></div>
      <div class="slider-img img-after" id="sliderAfter" style="position:absolute; top:0; left:0; width:100%; height:100%; background: url('${src2}') no-repeat center/contain; width:50%; border-right: 2px solid var(--accent);"></div>
      <input type="range" min="0" max="100" value="50" class="image-comparison-slider" id="splitSlider" oninput="handleSliderMove(this.value)" style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor: ew-resize; z-index: 10;" />
      <div class="slider-handle" id="sliderHandle" style="position:absolute; top:0; left:50%; width:4px; height:100%; background:var(--accent); pointer-events:none; transform: translateX(-50%); display:flex; align-items:center; justify-content:center;">
         <span style="background:var(--accent); color:white; border-radius:50%; padding:6px; font-size:12px; font-weight:700; box-shadow: 0 4px 10px rgba(0,0,0,0.5)">↔</span>
      </div>
      <span style="position:absolute; bottom:1rem; left:1rem; background:rgba(0,0,0,0.6); color:white; padding:4px 8px; border-radius:4px; font-size:0.75rem; font-weight:700;">Before (Original)</span>
      <span style="position:absolute; bottom:1rem; right:1rem; background:rgba(0,0,0,0.6); color:white; padding:4px 8px; border-radius:4px; font-size:0.75rem; font-weight:700;">After (Modified)</span>
    </div>`;
    
  const grid = document.getElementById("imageGrid");
  if (grid && grid.parentNode) {
    grid.parentNode.innerHTML = html;
  }
}

function handleSliderMove(val) {
  const imgAfter = document.getElementById("sliderAfter");
  const handle = document.getElementById("sliderHandle");
  if (imgAfter) imgAfter.style.width = val + "%";
  if (handle) handle.style.left = val + "%";
}

// ═══ FOLDER DIFF ═══
function renderFolderDiff(result) {
  document.getElementById("tabsRow").style.display = "none";
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-card stat-green"><span class="stat-icon">➕</span><div><div class="stat-value">${result.stats.added}</div><div class="stat-label">Added Files</div></div></div>
    <div class="stat-card stat-red"><span class="stat-icon">➖</span><div><div class="stat-value">${result.stats.removed}</div><div class="stat-label">Removed Files</div></div></div>
    <div class="stat-card stat-yellow"><span class="stat-icon">✏️</span><div><div class="stat-value">${result.stats.changed}</div><div class="stat-label">Modified Files</div></div></div>
    <div class="stat-card stat-blue"><span class="stat-icon">📊</span><div><div class="stat-value">${result.stats.similarity_percent}%</div><div class="stat-label">Avg Similarity</div></div></div>`;
    
  const container = document.getElementById("sideBySide");
  container.classList.add("active");
  
  let html = `
    <div class="sbs-container" style="grid-template-columns: 1fr; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; background: var(--surface); padding: 1.5rem; display:block;">
      <h2 style="font-size: 1.25rem; font-weight:700; margin-bottom:1.5rem; display:flex; align-items:center; gap:8px;">📂 Folder Comparison Results</h2>
      <table class="diff-table">
        <thead>
          <tr>
            <th>Filename</th>
            <th>Status</th>
            <th>Similarity</th>
            <th>Details</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>`;
        
  result.differences.forEach((file, index) => {
    let badge = "";
    let score = `${file.similarity}%`;
    let action = "";
    let details = "";
    
    if (file.status === "added") {
      badge = `<span class="badge badge-added">Added</span>`;
      score = "—";
      details = "File only exists in Folder B (Modified)";
      action = `—`;
    } else if (file.status === "removed") {
      badge = `<span class="badge badge-removed">Removed</span>`;
      score = "—";
      details = "File only exists in Folder A (Original)";
      action = `—`;
    } else if (file.status === "identical") {
      badge = `<span style="background:rgba(255,255,255,0.05); color:var(--muted);" class="badge">Identical</span>`;
      details = "No changes detected";
      action = `—`;
    } else if (file.status === "modified") {
      badge = `<span class="badge badge-changed">Modified</span>`;
      details = `Added: ${file.changes.added}, Removed: ${file.changes.removed}, Changed: ${file.changes.changed}`;
      action = `<button class="back-btn" onclick="viewFolderFileDiff(${index})" style="background:var(--accent); color:#fff; padding:4px 10px; font-size:11px; border-radius:4px; font-weight:700;">🔍 View Diff</button>`;
    }
    
    html += `
      <tr>
        <td style="font-weight:700; font-family: 'JetBrains Mono', monospace; font-size:0.9rem;">${escHtml(file.filename)}</td>
        <td>${badge}</td>
        <td style="font-family: 'JetBrains Mono', monospace;">${score}</td>
        <td style="color:var(--muted); font-size:0.85rem;">${details}</td>
        <td>${action}</td>
      </tr>`;
  });
  
  html += `</tbody></table></div>`;
  
  html += `
    <div id="fileDiffModal" class="modal-overlay" onclick="closeFileDiffModal()" style="padding: 2rem;">
      <div class="modal" onclick="event.stopPropagation()" style="max-width: 90%; width: 1200px; max-height: 90vh; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
          <h3 style="font-size: 1.2rem; font-weight:800; color:var(--text);" id="modalTitle">File Diff</h3>
          <button onclick="closeFileDiffModal()" class="back-btn" style="padding: 4px 12px; background:var(--border)">Close</button>
        </div>
        <div id="modalDiffContent" style="flex:1; max-height: 70vh; overflow-y:auto;"></div>
      </div>
    </div>`;
    
  container.innerHTML = html;
}

function viewFolderFileDiff(index) {
  let resStr = sessionStorage.getItem("diffResult") || localStorage.getItem("lastResult");
  const resultObj = JSON.parse(resStr || "{}");
  const actualResult = resultObj.results || resultObj;
  
  const file = actualResult.differences[index];
  if (!file || !file.results) return;
  
  document.getElementById("modalTitle").textContent = `Differences in ${file.filename} (${file.similarity}% similarity)`;
  document.getElementById("fileDiffModal").classList.add("active");
  
  const contentDiv = document.getElementById("modalDiffContent");
  
  if (file.results.type === "image") {
    contentDiv.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center; gap:16px; padding: 1rem;">
        <div class="stat-card" style="width:fit-content; margin:0 auto;">
          <span class="stat-icon">📊</span>
          <div>
            <div class="stat-value">${file.similarity}%</div>
            <div class="stat-label">Similarity (Visual)</div>
          </div>
        </div>
        <div style="text-align:center; width:100%;">
          <div style="margin-bottom:8px; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase;">🔴 Difference Overlay Highlight</div>
          <img src="data:image/png;base64,${file.results.diff_image_base64}" style="max-width:100%; max-height:60vh; border:1px solid var(--border); border-radius:8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);"/>
        </div>
      </div>
    `;
    return;
  }
  
  // Hijack sbsContent temporarily
  const origSbs = document.getElementById("sbsContent");
  const tempDiv = document.createElement("div");
  tempDiv.id = "sbsContent";
  contentDiv.innerHTML = "";
  contentDiv.appendChild(tempDiv);
  
  renderSideBySide(file.results.full_text1, file.results.full_text2, file.results.differences);
  
  // Re-id to prevent collision
  tempDiv.id = "modalSbsContent";
}

function closeFileDiffModal() {
  document.getElementById("fileDiffModal").classList.remove("active");
}

// ═══ AI ═══
function renderAI(analysis) {
  document.getElementById("aiText").textContent = analysis || "No AI analysis available. Enable AI Node on dashboard.";
}

let chatContext = "";
async function sendChat() {
  const input = document.getElementById("chatInput");
  const msg = input.value.trim();
  if (!msg) return;
  const messages = document.getElementById("chatMessages");
  messages.innerHTML += `<div class="chat-msg user">${escHtml(msg)}</div>`;
  input.value = "";
  document.getElementById("chatSend").disabled = true;
  const loadingDiv = document.createElement("div");
  loadingDiv.className = "chat-msg ai";
  loadingDiv.textContent = "Thinking...";
  messages.appendChild(loadingDiv);
  messages.scrollTop = messages.scrollHeight;
  try {
    const form = new FormData();
    form.append("message", msg);
    form.append("context", chatContext);
    const token = localStorage.getItem("token") || "";
    const res = await fetch("/api/ai/chat", { method: "POST", headers: { "Authorization": "Bearer " + token }, body: form });
    const data = await res.json();
    loadingDiv.textContent = data.reply || data.detail || "No response.";
  } catch (e) {
    loadingDiv.textContent = "Error: " + e.message;
  }
  document.getElementById("chatSend").disabled = false;
  messages.scrollTop = messages.scrollHeight;
}

async function downloadReport(type) {
  const token = localStorage.getItem("token") || "";
  let resStr = sessionStorage.getItem("diffResult");
  if (!resStr) resStr = localStorage.getItem("lastResult");
  const resultObj = JSON.parse(resStr || "{}");
  const comparisonId = resultObj.comparison_id || resultObj.id;
  
  if (!comparisonId) {
    alert("No comparison ID found to export report.");
    return;
  }
  
  const originalText = type === 'pdf' ? '📥 Export PDF Report' : '📥 Export Excel Report';
  const btn = document.getElementById(type === 'pdf' ? 'downloadPdfBtn' : 'downloadExcelBtn');
  if (btn) {
    btn.textContent = "Generating...";
    btn.disabled = true;
  }
  
  try {
    const res = await fetch(`/api/report/${type}/${comparisonId}`, {
      method: "POST",
      headers: { "Authorization": "Bearer " + token }
    });
    if (!res.ok) throw new Error("Report generation failed");
    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `DocMind_Report_${comparisonId}.${type === 'pdf' ? 'pdf' : 'xlsx'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
  } catch (e) {
    alert("Error: " + e.message);
  } finally {
    if (btn) {
      btn.textContent = originalText;
      btn.disabled = false;
    }
  }
}

// ═══ INIT ═══
(function init() {
  let resStr = sessionStorage.getItem("diffResult");
  if (!resStr) resStr = localStorage.getItem("lastResult");
  
  const resultObj = JSON.parse(resStr || "{}");
  const actualResult = resultObj.results || resultObj;

  if (!actualResult || Object.keys(actualResult).length === 0) {
    document.querySelector(".content").innerHTML = `<div class="empty-state" style="margin-top:40px"><div class="icon">❌</div><p>No result data found. Go back and compare documents.</p></div>`;
    return;
  }

  // Folder mode
  if (resultObj.fileType === "folder" || actualResult.type === "folder") {
    renderFolderDiff(actualResult);
    if (actualResult.ai_analysis) renderAI(actualResult.ai_analysis);
    return;
  }

  // Image mode
  if (actualResult.type === "image" || resultObj.fileType === "image") {
    renderImageDiff(actualResult);
    if (actualResult.ai_analysis) renderAI(actualResult.ai_analysis);
    return;
  }

  // Text mode
  populateStats(actualResult.stats);
  renderSideBySide(actualResult.full_text1, actualResult.full_text2, actualResult.differences);
  renderGranular(actualResult.differences || []);
  if (actualResult.ai_analysis) renderAI(actualResult.ai_analysis);

  chatContext = `Similarity: ${actualResult.stats?.similarity_percent}%. Changes: ${actualResult.stats?.total_changes}. Added: ${actualResult.stats?.added}, Removed: ${actualResult.stats?.removed}, Changed: ${actualResult.stats?.changed}.`;
})();
</script>
