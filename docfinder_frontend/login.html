<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · Docsy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .art-cube{width:220px;height:220px;position:relative;transform-style:preserve-3d;animation:rotate3d 14s linear infinite}
        @keyframes rotate3d{from{transform:rotateX(-20deg) rotateY(0)}to{transform:rotateX(-20deg) rotateY(360deg)}}
        .face{position:absolute;inset:0;border-radius:24px;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);display:grid;place-items:center;font-size:3rem}
        .face.f1{transform:translateZ(110px)} .face.f2{transform:rotateY(90deg) translateZ(110px)}
        .face.f3{transform:rotateY(180deg) translateZ(110px)} .face.f4{transform:rotateY(-90deg) translateZ(110px)}
        .face.f5{transform:rotateX(90deg) translateZ(110px)} .face.f6{transform:rotateX(-90deg) translateZ(110px)}
        .art-text{position:absolute;bottom:3rem;left:3rem;right:3rem;z-index:2}
        .art-text h2{font-size:1.8rem;font-weight:800;margin-bottom:.5rem}
        .art-text p{opacity:.7}
    </style>
</head>
<body>
    <div class="auth-shell">
        <div class="auth-art">
            <div class="art-cube">
                <div class="face f1">📝</div>
                <div class="face f2">📄</div>
                <div class="face f3">📊</div>
                <div class="face f4">📈</div>
                <div class="face f5">✨</div>
                <div class="face f6">⚡</div>
            </div>
            <div class="art-text">
                <h2>Welcome back.</h2>
                <p>Pick up where you left off — your comparisons are waiting.</p>
            </div>
        </div>
        
        <div class="auth-form">
            <div class="auth-card animate-in">
                <div class="brand" style="margin-bottom:2rem">
                    <div class="brand-mark">D</div>
                    Docsy
                </div>
                <h1>Sign in</h1>
                <p class="sub">Enter your credentials to access your dashboard.</p>
                
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="field">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="you@company.com" required>
                    </div>
                    <div class="field">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
                        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.9rem">
                            <input type="checkbox" style="width:auto"> Remember me
                        </label>
                        <a href="#" style="color:var(--accent);font-size:.9rem;font-weight:600">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%" id="loginBtn">
                        Sign in →
                    </button>
                </form>
                
                <p style="text-align:center;margin-top:1.5rem;color:var(--muted)">
                    New here? <a href="register.html" style="color:var(--accent);font-weight:600">Create an account</a>
                </p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="loading" class="loading" style="display:none">
        <div class="spinner"></div>
        <p>Signing in...</p>
    </div>

    <script>
        // Auto-detect backend location
        const API_URL = (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';
        
        async function handleLogin(e) {
            e.preventDefault();
            console.log('handleLogin called');
            const btn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            const toast = document.getElementById('toast');
            
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            loading.style.display = 'flex';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            console.log('Form values:', {email, password});
            
            // Extract username from email for login
            const username = email.split('@')[0];
            console.log('Username to send:', username);
            
            try {
                const url = `${API_URL}/api/login`;
                console.log('Fetching:', url);
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                console.log('Response:', res.status);
                
                const data = await res.json();
                
                if (res.ok && data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', username);
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('isAdmin', data.is_admin);
                    showToast('Login successful!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showToast(data.detail || 'Login failed', 'error');
                }
            } catch (err) {
                showToast('Connection error. Is the server running?', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign in →';
                loading.style.display = 'none';
            }
        }
        
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.className = 'toast', 3000);
        }
    </script>
</body>
</html>
