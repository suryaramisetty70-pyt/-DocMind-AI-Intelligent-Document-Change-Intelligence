<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vennila AI Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #030712;
            color: #f3f4f6;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header Control Bar */
        header {
            height: 70px;
            background: rgba(17, 24, 39, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.02em;
        }
        .logo-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3b82f6;
            box-shadow: 0 0 12px #3b82f6;
        }

        /* Mode Switcher Tabs */
        .tabs-container {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 60%;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        /* Hide scrollbar for tabs */
        .tabs-container::-webkit-scrollbar { display: none; }
        
        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .tab-btn {
            padding: 8px 18px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            color: #9ca3af;
            background: transparent;
            border: 0;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .tab-btn:hover {
            color: #fff;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 15px -4px rgba(59, 130, 246, 0.5);
        }

        /* Header Control Buttons */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
            color: #f3f4f6;
            transition: all 0.2s;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: 0;
            box-shadow: 0 4px 12px -3px rgba(59, 130, 246, 0.4);
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* Fullscreen Frame Container */
        .workspace {
            flex: 1;
            position: relative;
            background: #030712;
        }
        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            transition: opacity 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }
        iframe.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        /* Loading Overlay */
        .loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #030712;
            z-index: 5;
            flex-direction: column;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            width: min(460px, 94vw);
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: modalIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-close {
            background: transparent;
            border: 0;
            color: #9ca3af;
            font-size: 24px;
            cursor: pointer;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #9ca3af;
        }
        .form-group input {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            outline: none;
            font-size: 14px;
        }
        .form-group input:focus {
            border-color: #3b82f6;
        }

        /* Workspace Manage Row */
        .workspace-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .workspace-row:last-child { border-bottom: 0; }
        .workspace-row span { font-size: 14px; }
        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-dot"></div>
            Vennila AI Studio
        </div>
        
        <div class="tabs-container">
            <div class="tabs" id="tabList">
                <!-- Tabs rendered dynamically -->
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="openModal('manageModal')">⚙️ Manage</button>
            <button class="btn btn-primary" onclick="openModal('addModal')">➕ Add Project</button>
        </div>
    </header>

    <div class="workspace" id="frameContainer">
        <!-- Spinner background -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="font-size: 13px; color: #9ca3af; letter-spacing: 0.05em;">LOADING WORKSPACE...</p>
        </div>

        <!-- Iframes rendered dynamically -->
    </div>

    <!-- ADD WORKSPACE MODAL -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-card">
            <div class="modal-head">
                <h3>Add New Project</h3>
                <button class="modal-close" onclick="closeModal('addModal')">×</button>
            </div>
            <form id="addForm" onsubmit="saveNewWorkspace(event)">
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="projName" required placeholder="e.g. Buddy AI">
                </div>
                <div class="form-group">
                    <label>Vite / Render App URL</label>
                    <input type="url" id="projUrl" required placeholder="https://my-project.onrender.com">
                </div>
                <div class="form-group">
                    <label>Emoji Icon</label>
                    <input type="text" id="projEmoji" placeholder="🤖" value="🤖" maxlength="2">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px; margin-top: 10px;">
                    Save Project
                </button>
            </form>
        </div>
    </div>

    <!-- MANAGE WORKSPACES MODAL -->
    <div class="modal-overlay" id="manageModal">
        <div class="modal-card">
            <div class="modal-head">
                <h3>Manage Custom Projects</h3>
                <button class="modal-close" onclick="closeModal('manageModal')">×</button>
            </div>
            <div id="workspaceList" style="max-height: 300px; overflow-y: auto;">
                <!-- List of custom workspaces -->
            </div>
        </div>
    </div>

    <script>
        // Core default workspaces
        const DEFAULT_WORKSPACES = [
            { id: 'docmind', name: 'DocMind AI', url: '/difflab.html', emoji: '📄', isDefault: true },
            { id: 'dialer', name: 'Call Dialer', url: 'https://menmozhicallcampaign-1.onrender.com', emoji: '📞', isDefault: true }
        ];

        let workspaces = [];

        // Load workspaces from localStorage
        function loadWorkspaces() {
            const saved = localStorage.getItem('vennila_workspaces');
            if (saved) {
                workspaces = [...DEFAULT_WORKSPACES, ...JSON.parse(saved)];
            } else {
                workspaces = [...DEFAULT_WORKSPACES];
            }
            renderTabs();
            renderIframes();
            
            // Activate first workspace by default
            if (workspaces.length > 0) {
                switchApp(workspaces[0].id);
            }
        }

        // Render tab buttons
        function renderTabs() {
            const tabList = document.getElementById('tabList');
            tabList.innerHTML = '';
            workspaces.forEach(ws => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.id = `tab-${ws.id}`;
                btn.onclick = () => switchApp(ws.id);
                btn.innerHTML = `${ws.emoji} ${ws.name}`;
                tabList.appendChild(btn);
            });
        }

        // Render iframe tags
        function renderIframes() {
            const container = document.getElementById('frameContainer');
            
            // Remove existing custom iframes
            container.querySelectorAll('iframe').forEach(f => f.remove());

            workspaces.forEach(ws => {
                const iframe = document.createElement('iframe');
                iframe.id = `frame-${ws.id}`;
                iframe.src = ws.isDefault ? ws.url : ''; // Lazy-load custom ones
                iframe.onload = () => hideLoader();
                container.appendChild(iframe);
            });
        }

        // Switch active workspace
        function switchApp(id) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));

            const tab = document.getElementById(`tab-${id}`);
            const frame = document.getElementById(`frame-${id}`);
            const ws = workspaces.find(w => w.id === id);

            if (tab && frame) {
                tab.classList.add('active');
                
                // Show loader if not loaded yet
                if (!frame.src || frame.src === window.location.href || frame.src === "") {
                    document.getElementById('loader').style.display = 'flex';
                    frame.src = ws.url;
                }
                
                frame.classList.add('active');
            }
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
        }

        // Modal Helpers
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            if (id === 'manageModal') {
                renderManageList();
            }
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Save Custom Workspace
        function saveNewWorkspace(e) {
            e.preventDefault();
            const name = document.getElementById('projName').value;
            const url = document.getElementById('projUrl').value;
            const emoji = document.getElementById('projEmoji').value || '🤖';
            const id = 'custom-' + Date.now();

            const customWorkspaces = JSON.parse(localStorage.getItem('vennila_workspaces') || '[]');
            customWorkspaces.push({ id, name, url, emoji });
            localStorage.setItem('vennila_workspaces', JSON.stringify(customWorkspaces));

            document.getElementById('addForm').reset();
            closeModal('addModal');
            loadWorkspaces();
            
            // Switch to the newly added workspace
            setTimeout(() => switchApp(id), 200);
        }

        // Render list in Manage panel
        function renderManageList() {
            const list = document.getElementById('workspaceList');
            list.innerHTML = '';
            
            const customOnly = workspaces.filter(ws => !ws.isDefault);
            
            if (customOnly.length === 0) {
                list.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:20px;">No custom projects added yet.</p>';
                return;
            }

            customOnly.forEach(ws => {
                const row = document.createElement('div');
                row.className = 'workspace-row';
                row.innerHTML = `
                    <span>${ws.emoji} <b>${ws.name}</b></span>
                    <button class="btn btn-danger" onclick="deleteWorkspace('${ws.id}')">Delete</button>
                `;
                list.appendChild(row);
            });
        }

        // Delete custom workspace
        function deleteWorkspace(id) {
            let customWorkspaces = JSON.parse(localStorage.getItem('vennila_workspaces') || '[]');
            customWorkspaces = customWorkspaces.filter(ws => ws.id !== id);
            localStorage.setItem('vennila_workspaces', JSON.stringify(customWorkspaces));
            
            loadWorkspaces();
            renderManageList();
        }

        // Init
        loadWorkspaces();
    </script>
</body>
</html>
