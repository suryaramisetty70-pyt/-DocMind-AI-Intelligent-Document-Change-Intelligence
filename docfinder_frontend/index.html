<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vennila AI Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #030712;
            color: #f3f4f6;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header Control Bar */
        header {
            height: 70px;
            background: rgba(17, 24, 39, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.02em;
        }
        .logo-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3b82f6;
            box-shadow: 0 0 12px #3b82f6;
        }

        /* Mode Switcher Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px;
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .tab-btn {
            padding: 8px 20px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            color: #9ca3af;
            background: transparent;
            border: 0;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn:hover {
            color: #fff;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 15px -4px rgba(59, 130, 246, 0.5);
        }

        .status-badge {
            font-size: 11px;
            font-family: monospace;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(25, 195, 154, 0.1);
            border: 1px solid rgba(25, 195, 154, 0.2);
            color: #19c39a;
        }

        /* Fullscreen Frame Container */
        .workspace {
            flex: 1;
            position: relative;
            background: #030712;
        }
        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            transition: opacity 0.4s ease;
            opacity: 0;
        }
        iframe.active {
            opacity: 1;
            z-index: 10;
        }

        /* Loading Overlay between switches */
        .loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #030712;
            z-index: 5;
            flex-direction: column;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-dot"></div>
            Vennila AI Studio
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchApp('docmind', '/difflab.html')">
                📄 DocMind AI
            </button>
            <button class="tab-btn" onclick="switchApp('dialer', 'https://other-project.onrender.com')">
                📞 Call Dialer
            </button>
        </div>

        <div class="status-badge">WORKSPACE ONLINE</div>
    </header>

    <div class="workspace">
        <!-- Spinner background -->
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="font-size: 13px; color: #9ca3af; letter-spacing: 0.05em;">LOADING WORKSPACE...</p>
        </div>

        <!-- App frames -->
        <iframe id="frame-docmind" class="active" src="/difflab.html" onload="hideLoader()"></iframe>
        <iframe id="frame-dialer" src="" onload="hideLoader()"></iframe>
    </div>

    <script>
        const loader = document.getElementById('loader');

        function switchApp(appId, url) {
            // Update active tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Show loader
            loader.style.display = 'flex';

            // Deactivate all frames
            document.querySelectorAll('iframe').forEach(frame => {
                frame.classList.remove('active');
            });

            // Get target frame
            const targetFrame = document.getElementById(`frame-${appId}`);
            
            // Set src if not loaded yet
            if (!targetFrame.src || targetFrame.src === window.location.href) {
                targetFrame.src = url;
            }

            targetFrame.classList.add('active');
        }

        function hideLoader() {
            loader.style.display = 'none';
        }
    </script>
</body>
</html>
