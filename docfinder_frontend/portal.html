<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vennila AI — Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── Top Header ─── */
        header {
            height: 64px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.03);
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #0f172a;
            letter-spacing: -0.03em;
            cursor: pointer;
        }
        .logo-mark {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
        }

        /* Dynamic tabs in header */
        .tabs-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 50%;
            overflow-x: auto;
        }
        .tabs-wrapper::-webkit-scrollbar { display: none; }
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 3px;
            border-radius: 99px;
            border: 1px solid var(--border);
        }
        .tab-btn {
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            background: transparent;
            border: 0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px -2px rgba(59, 130, 246, 0.35);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hdr-btn {
            padding: 7px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .hdr-btn:hover {
            background: var(--bg);
            border-color: var(--accent);
            color: var(--accent);
        }
        .hdr-btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .hdr-btn-primary:hover {
            opacity: 0.9;
        }

        /* ─── Launchpad (Folder Grid View) ─── */
        .launchpad {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem 4rem;
        }
        .launchpad.hidden { display: none !important; }

        .launchpad-head {
            margin-bottom: 2.5rem;
            text-align: center;
        }
        .launchpad-head h1 {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
        }
        .launchpad-head p {
            color: var(--muted);
            font-size: 0.95rem;
        }

        /* Folder grid */
        .folders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.25rem;
            width: 100%;
            max-width: 960px;
        }

        .folder-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .folder-card:hover {
            transform: translateY(-3px);
            border-color: rgba(59, 130, 246, 0.25);
            box-shadow: 0 8px 24px -8px rgba(59, 130, 246, 0.12);
        }

        /* Mini icon preview grid inside folder card */
        .folder-preview-grid {
            width: 64px;
            height: 64px;
            background: var(--bg);
            border-radius: 14px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            padding: 6px;
        }
        .folder-preview-item {
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            background: rgba(59, 130, 246, 0.04);
        }

        .folder-info h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 2px;
        }
        .folder-info p {
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            grid-column: 1 / -1;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state h3 { font-size: 1.15rem; font-weight: 700; color: #0f172a; margin-bottom: 0.5rem; }
        .empty-state p { color: var(--muted); font-size: 0.9rem; }

        /* ─── Folder Popup Overlay ─── */
        .folder-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .folder-expanded-card {
            width: min(480px, 92vw);
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 60px -15px rgba(15, 23, 42, 0.2);
            animation: modalIn 0.3s cubic-bezier(0.2, 0.85, 0.25, 1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .folder-expanded-card h2 {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #0f172a;
        }
        .app-icons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            max-height: 340px;
            overflow-y: auto;
            padding: 8px;
        }
        .app-icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px 8px;
            border-radius: 14px;
            transition: all 0.2s;
        }
        .app-icon-item:hover {
            background: var(--bg);
        }
        .app-icon-circle {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .app-icon-item:hover .app-icon-circle {
            border-color: var(--accent);
            box-shadow: 0 4px 12px -4px rgba(59, 130, 246, 0.2);
        }
        .app-icon-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text);
            text-align: center;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ─── Workspace Player ─── */
        .workspace {
            flex: 1;
            position: relative;
            background: var(--bg);
            display: none;
        }
        .workspace-active { display: block !important; }
        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        iframe.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }
        .loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 5;
            flex-direction: column;
            gap: 12px;
        }
        .load-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Modals ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            width: min(440px, 92vw);
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.75rem;
            box-shadow: 0 20px 60px -15px rgba(15, 23, 42, 0.2);
            animation: modalIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }
        .modal-head h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0f172a;
        }
        .modal-close {
            background: transparent;
            border: 0;
            color: var(--muted);
            font-size: 1.5rem;
            cursor: pointer;
            line-height: 1;
        }
        .modal-close:hover { color: var(--error); }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 1rem;
        }
        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--muted);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.6rem 0.85rem;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: #fff;
            color: var(--text);
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
        }

        .manage-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }
        .manage-row:last-child { border-bottom: 0; }
        .manage-row span { font-size: 0.88rem; }
        .btn-danger {
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: var(--error);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.12); }

        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            background: var(--accent);
            color: #fff;
            border: 0;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .submit-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showLaunchpad()">
            <div class="logo-mark"></div>
            Vennila AI
        </div>
        
        <div class="tabs-wrapper">
            <div class="tabs" id="tabList">
                <!-- Dynamically opened tabs show here -->
            </div>
        </div>

        <div class="controls">
            <button class="hdr-btn" onclick="openModal('manageModal')">⚙️ Manage</button>
            <button class="hdr-btn hdr-btn-primary" onclick="openModal('submitModal')">➕ Add Project</button>
        </div>
    </header>

    <!-- 1. LAUNCHPAD PORTAL (FOLDER VIEW) -->
    <div class="launchpad" id="launchpadView">
        <div class="launchpad-head">
            <h1>📂 My Projects</h1>
            <p>Click a folder to view and launch your projects.</p>
        </div>

        <main class="folders-grid" id="folderGrid">
            <!-- Folders rendered dynamically -->
        </main>
    </div>

    <!-- 2. WORKSPACE PLAYER VIEW -->
    <div class="workspace" id="workspaceView">
        <div class="loader" id="loader">
            <div class="load-spinner"></div>
            <p style="font-size: 0.82rem; color: var(--muted); letter-spacing: 0.02em;">Loading project...</p>
        </div>
        <div id="iframeContainer">
            <!-- Dynamically generated iframes -->
        </div>
    </div>

    <!-- FOLDER POPUP DIALOG -->
    <div class="folder-overlay" id="folderOverlay" onclick="closeFolderOverlay(event)">
        <div class="folder-expanded-card">
            <h2 id="folderTitle">Projects</h2>
            <div class="app-icons-grid" id="appGrid">
                <!-- App icons show here -->
            </div>
        </div>
    </div>

    <!-- SUBMIT APP MODAL -->
    <div class="modal-overlay" id="submitModal">
        <div class="modal-card">
            <div class="modal-head">
                <h3>Add a Project</h3>
                <button class="modal-close" onclick="closeModal('submitModal')">×</button>
            </div>
            <form id="submitForm" onsubmit="submitNewApp(event)">
                <div class="form-group">
                    <label>Project Title</label>
                    <input type="text" id="appName" required placeholder="e.g. WhatsApp Auto-Agent">
                </div>
                <div class="form-group">
                    <label>Deployment URL</label>
                    <input type="url" id="appUrl" required placeholder="https://your-project.onrender.com">
                </div>
                <div class="form-group">
                    <label>Emoji Icon</label>
                    <input type="text" id="appEmoji" placeholder="🤖" value="🤖" maxlength="2">
                </div>
                <div class="form-group">
                    <label>Folder / Category</label>
                    <select id="appFolder" required>
                        <!-- Categories filled dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="appDesc" placeholder="Brief summary of the project..." rows="3"></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit Project</button>
            </form>
        </div>
    </div>

    <!-- MANAGE APPS MODAL -->
    <div class="modal-overlay" id="manageModal">
        <div class="modal-card">
            <div class="modal-head">
                <h3>Manage Projects</h3>
                <button class="modal-close" onclick="closeModal('manageModal')">×</button>
            </div>
            <div id="manageAppList" style="max-height:300px; overflow-y:auto;">
                <!-- List of deletion hooks -->
            </div>
        </div>
    </div>

    <script>
        let workspaceData = [];
        let openTabs = [];
        let activeTabId = null;

        // Fetch workspaces/folders from PostgreSQL backend
        async function fetchWorkspaces() {
            try {
                const response = await fetch('/api/portal/workspaces');
                workspaceData = await response.json();
                
                renderFolders();
                populateCategoryDropdown();
            } catch (err) {
                console.error("Error fetching workspace portal data:", err);
                // Show empty state
                renderFolders();
            }
        }

        // Render Launchpad Folder list
        function renderFolders() {
            const grid = document.getElementById('folderGrid');
            grid.innerHTML = '';

            if (!workspaceData || workspaceData.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📂</div>
                        <h3>No projects yet</h3>
                        <p>Click "Add Project" to link your first deployment.</p>
                    </div>
                `;
                return;
            }

            workspaceData.forEach(folder => {
                const card = document.createElement('div');
                card.className = 'folder-card';
                card.onclick = () => openFolder(folder.id);

                // Build mini icon preview grid
                let previewHTML = '<div class="folder-preview-grid">';
                for (let i = 0; i < 9; i++) {
                    const app = folder.apps[i];
                    previewHTML += `<div class="folder-preview-item">${app ? app.icon_emoji : ''}</div>`;
                }
                previewHTML += '</div>';

                card.innerHTML = `
                    ${previewHTML}
                    <div class="folder-info">
                        <h3>${folder.icon} ${folder.name}</h3>
                        <p>${folder.apps.length} project${folder.apps.length === 1 ? '' : 's'}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Open expanded folder popover
        function openFolder(folderId) {
            const folder = workspaceData.find(f => f.id === folderId);
            if (!folder) return;

            document.getElementById('folderTitle').textContent = `${folder.icon} ${folder.name}`;
            const grid = document.getElementById('appGrid');
            grid.innerHTML = '';

            if (folder.apps.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; color:var(--muted); padding:2rem 0;">No projects in this folder yet.</div>';
            } else {
                folder.apps.forEach(app => {
                    const item = document.createElement('div');
                    item.className = 'app-icon-item';
                    item.onclick = (e) => {
                        e.stopPropagation();
                        closeFolderOverlay(null, true);
                        launchApp(app);
                    };

                    item.innerHTML = `
                        <div class="app-icon-circle">${app.icon_emoji}</div>
                        <div class="app-icon-label" title="${app.title}">${app.title}</div>
                    `;
                    grid.appendChild(item);
                });
            }

            document.getElementById('folderOverlay').style.display = 'flex';
        }

        function closeFolderOverlay(e, force = false) {
            if (force || e.target === document.getElementById('folderOverlay')) {
                document.getElementById('folderOverlay').style.display = 'none';
            }
        }

        // Launch app into target iframe and register a tab in header
        function launchApp(app) {
            showWorkspace();
            
            // Check if tab is already open
            if (!openTabs.some(t => t.id === app.id)) {
                openTabs.push(app);
                
                // Add iframe container
                const container = document.getElementById('iframeContainer');
                const iframe = document.createElement('iframe');
                iframe.id = `iframe-${app.id}`;
                iframe.onload = () => hideLoader();
                container.appendChild(iframe);
            }

            activeTabId = app.id;
            renderTabs();
            activateIframe(app);
        }

        // Set active iframe src and toggle CSS classes
        function activateIframe(app) {
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            
            const frame = document.getElementById(`iframe-${app.id}`);
            if (frame) {
                if (!frame.src || frame.src === window.location.href || frame.src === "") {
                    document.getElementById('loader').style.display = 'flex';
                    frame.src = app.url;
                }
                frame.classList.add('active');
            }
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
        }

        // Render header tab list
        function renderTabs() {
            const list = document.getElementById('tabList');
            list.innerHTML = '';

            openTabs.forEach(tab => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${tab.id === activeTabId ? 'active' : ''}`;
                btn.onclick = () => selectTab(tab.id);
                btn.innerHTML = `
                    <span>${tab.icon_emoji} ${tab.title}</span>
                    <span style="font-size:12px; font-weight:700; margin-left:4px;" onclick="closeTab(event, '${tab.id}')">×</span>
                `;
                list.appendChild(btn);
            });
        }

        function selectTab(id) {
            activeTabId = id;
            showWorkspace();
            renderTabs();
            
            const app = openTabs.find(t => t.id === id);
            if (app) activateIframe(app);
        }

        function closeTab(e, id) {
            e.stopPropagation();
            
            // Close iframe
            const frame = document.getElementById(`iframe-${id}`);
            if (frame) frame.remove();

            // Filter openTabs
            openTabs = openTabs.filter(t => t.id !== id);

            if (openTabs.length === 0) {
                showLaunchpad();
            } else if (activeTabId === id) {
                selectTab(openTabs[openTabs.length - 1].id);
            } else {
                renderTabs();
            }
        }

        // Toggle Screen Views
        function showWorkspace() {
            document.getElementById('launchpadView').classList.add('hidden');
            document.getElementById('workspaceView').classList.add('workspace-active');
        }

        function showLaunchpad() {
            document.getElementById('workspaceView').classList.remove('workspace-active');
            document.getElementById('launchpadView').classList.remove('hidden');
            activeTabId = null;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
        }

        // Submit New App to PostgreSQL
        async function submitNewApp(e) {
            e.preventDefault();
            const title = document.getElementById('appName').value;
            const url = document.getElementById('appUrl').value;
            const icon_emoji = document.getElementById('appEmoji').value || '🤖';
            const folder_id = parseInt(document.getElementById('appFolder').value);
            const description = document.getElementById('appDesc').value;

            try {
                const response = await fetch('/api/portal/apps', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, url, icon_emoji, folder_id, description })
                });
                
                if (response.ok) {
                    document.getElementById('submitForm').reset();
                    closeModal('submitModal');
                    await fetchWorkspaces();
                } else {
                    const err = await response.json();
                    alert("Error submitting project: " + err.detail);
                }
            } catch (err) {
                console.error("Submission failed:", err);
            }
        }

        // Dropdown list population
        function populateCategoryDropdown() {
            const dropdown = document.getElementById('appFolder');
            dropdown.innerHTML = '';
            workspaceData.forEach(folder => {
                const opt = document.createElement('option');
                opt.value = folder.id;
                opt.textContent = `${folder.icon} ${folder.name}`;
                dropdown.appendChild(opt);
            });
        }

        // Render deletion list for custom apps
        function renderManageAppList() {
            const list = document.getElementById('manageAppList');
            list.innerHTML = '';
            
            let count = 0;
            workspaceData.forEach(folder => {
                folder.apps.forEach(app => {
                    count++;
                    const row = document.createElement('div');
                    row.className = 'manage-row';
                    row.innerHTML = `
                        <span>${app.icon_emoji} <b>${app.title}</b> <span style="font-size:0.72rem; color:var(--muted)">(${folder.name})</span></span>
                        <button class="btn-danger" onclick="deleteApp(${app.id})">Delete</button>
                    `;
                    list.appendChild(row);
                });
            });

            if (count === 0) {
                list.innerHTML = '<p style="color:var(--muted); text-align:center; padding:1.5rem;">No projects found.</p>';
            }
        }

        async function deleteApp(appId) {
            if (!confirm("Are you sure you want to delete this project?")) return;
            try {
                const response = await fetch(`/api/portal/apps/${appId}`, { method: 'DELETE' });
                if (response.ok) {
                    await fetchWorkspaces();
                    renderManageAppList();
                }
            } catch (err) {
                console.error("Delete app failed:", err);
            }
        }

        // Modal triggers
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            if (id === 'manageModal') renderManageAppList();
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Close on escape key
        window.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closeModal('submitModal');
                closeModal('manageModal');
                closeFolderOverlay(null, true);
            }
        });

        // Initialize Launchpad
        fetchWorkspaces();
    </script>
</body>
</html>
